name: apply-parallel-recovery-pr

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/parallel-recovery' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/parallel-recovery
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply implementation
        id: apply
        continue-on-error: true
        run: |
          set +e
          python3 - <<'PY' > /tmp/apply-parallel.log 2>&1
          from pathlib import Path

          script = Path('scripts/apply-parallel-recovery-decoded.py')
          source = script.read_text(encoding='utf-8')

          old = '''    ''' + "'''" + '''} else {
          applyStage(job, "queued", "再実行待ちへ戻す");
          }

          return job;

          });
          }''' + "'''" + ''','''
          new = '''    ''' + "'''" + '''} else {
            applyStage(job, "queued", "再実行待ちへ戻す");
          }

          return job;

          });
          }''' + "'''" + ''','''
          if old not in source:
              raise SystemExit('automatic continuation compatibility marker not found')
          source = source.replace(old, new, 1)

          lines = source.splitlines()
          marker_index = next(
              (i for i, line in enumerate(lines) if '"agent session key assignment"' in line),
              None,
          )
          if marker_index is None:
              raise SystemExit('agent session assignment marker not found')
          patched = 0
          for i in range(max(0, marker_index - 12), marker_index):
              if lines[i].startswith("    '''  console.log(`"):
                  lines[i] = "    r" + lines[i].lstrip()
                  patched += 1
              elif lines[i].startswith("    '''  if (!args.sessionKey"):
                  lines[i] = "    r" + lines[i].lstrip()
                  patched += 1
          if patched != 2:
              raise SystemExit(f'agent session raw-string patch expected 2 lines, found {patched}')
          script.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          python3 scripts/apply-parallel-recovery-decoded.py >> /tmp/apply-parallel.log 2>&1
          status=$?
          cat /tmp/apply-parallel.log
          cp /tmp/apply-parallel.log scripts/apply-parallel-error.log
          exit "$status"
      - name: Commit diagnostic
        if: steps.apply.outcome == 'failure'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f scripts/apply-parallel-error.log
          git diff --cached --quiet || git commit -m "Record parallel recovery apply failure"
          git push origin HEAD:feature/parallel-recovery
      - name: Stop after apply failure
        if: steps.apply.outcome == 'failure'
        run: exit 1
      - name: Apply compatibility fixes
        if: steps.apply.outcome == 'success'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          check = Path('check.js')
          text = check.read_text(encoding='utf-8')
          text = text.replace(
              "const marker = '<article class=\"job\" data-job-id=\"' + jobId + '\"';",
              "const marker = 'class=\"job\" data-job-id=\"' + jobId + '\"';"
          )
          check.write_text(text, encoding='utf-8')

          app = Path('app.js')
          text = app.read_text(encoding='utf-8')
          text = text.replace(
              'worker = { workerId: "", sessionId: "", pid: null, leaseSeconds: 300 };',
              'worker = { workerId: "", sessionId: "", pid: null, leaseSeconds: 300, excludedProjects: [] };'
          )
          app.write_text(text, encoding='utf-8')
          PY
      - if: steps.apply.outcome == 'success'
        run: npm run check:syntax
      - if: steps.apply.outcome == 'success'
        run: npm run check
      - if: steps.apply.outcome == 'success'
        run: python3 -m py_compile dispatcher/dispatcher.py scripts/chatgpt-compose.py scripts/chatgpt-compose-bridge.py
      - if: steps.apply.outcome == 'success'
        run: python3 tests/dispatcher-git.check.py
      - if: steps.apply.outcome == 'success'
        run: python3 tests/dispatcher-parallel.check.py
      - if: steps.apply.outcome == 'success'
        run: git diff --check
      - name: Commit implementation
        if: steps.apply.outcome == 'success'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.js check.js package.json agent/agent.js agent/chatgpt.js agent/fake-browser-client.js dispatcher/dispatcher.py tests/chatgpt-parallel.check.js tests/dispatcher-parallel.check.py .github/workflows/test.yml
          git diff --cached --quiet || git commit -m "Add parallel jobs and recovery handoffs"
          git push origin HEAD:feature/parallel-recovery
