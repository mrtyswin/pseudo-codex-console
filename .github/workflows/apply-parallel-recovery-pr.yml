name: apply-parallel-recovery-pr

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/parallel-recovery' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/parallel-recovery
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply implementation
        id: apply
        continue-on-error: true
        run: |
          set +e
          python3 - <<'PY' > /tmp/apply-parallel.log 2>&1
          from pathlib import Path

          script = Path('scripts/apply-parallel-recovery-decoded.py')
          source = script.read_text(encoding='utf-8')

          old = '''    ''' + "'''" + '''} else {
          applyStage(job, "queued", "再実行待ちへ戻す");
          }

          return job;

          });
          }''' + "'''" + ''','''
          new = '''    ''' + "'''" + '''} else {
            applyStage(job, "queued", "再実行待ちへ戻す");
          }

          return job;

          });
          }''' + "'''" + ''','''
          if old not in source:
              raise SystemExit('automatic continuation compatibility marker not found')
          source = source.replace(old, new, 1)

          lines = source.splitlines()
          marker_index = next(
              (i for i, line in enumerate(lines) if '"agent session key assignment"' in line),
              None,
          )
          if marker_index is None:
              raise SystemExit('agent session assignment marker not found')
          start = marker_index
          while start >= 0 and lines[start].strip() != 'agent = replace_once(':
              start -= 1
          end = marker_index
          while end < len(lines) and lines[end].strip() != ')':
              end += 1
          if start < 0 or end >= len(lines):
              raise SystemExit('agent session assignment block bounds not found')
          lines[start:end + 1] = [
              'agent = replace_once(',
              '    agent,',
              "    '''  if (!args.task) {''',",
              "    '''  if (!args.sessionKey && args.jobId) args.sessionKey = args.jobId;",
              '',
              "  if (!args.task) {''',",
              '    "agent session key assignment",',
              ')',
          ]
          script.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          python3 scripts/apply-parallel-recovery-decoded.py >> /tmp/apply-parallel.log 2>&1
          status=$?
          cat /tmp/apply-parallel.log
          cp /tmp/apply-parallel.log scripts/apply-parallel-error.log
          exit "$status"
      - name: Commit apply diagnostic
        if: steps.apply.outcome == 'failure'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f scripts/apply-parallel-error.log
          git diff --cached --quiet || git commit -m "Record parallel recovery apply failure"
          git push origin HEAD:feature/parallel-recovery
      - name: Stop after apply failure
        if: steps.apply.outcome == 'failure'
        run: exit 1
      - name: Apply compatibility fixes
        if: steps.apply.outcome == 'success'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          check = Path('check.js')
          text = check.read_text(encoding='utf-8')
          text = text.replace(
              "const marker = '<article class=\"job\" data-job-id=\"' + jobId + '\"';",
              "const marker = 'class=\"job\" data-job-id=\"' + jobId + '\"';"
          )
          check.write_text(text, encoding='utf-8')

          app = Path('app.js')
          text = app.read_text(encoding='utf-8')
          text = text.replace(
              'worker = { workerId: "", sessionId: "", pid: null, leaseSeconds: 300 };',
              'worker = { workerId: "", sessionId: "", pid: null, leaseSeconds: 300, excludedProjects: [] };'
          )
          app.write_text(text, encoding='utf-8')

          chat = Path('agent/chatgpt.js')
          text = chat.read_text(encoding='utf-8')
          text = text.replace(
              "sessions.set('default', Promise.resolve({\n      page: defaultPage,\n      tail: Promise.resolve(),\n    }));",
              "sessions.set('default', Promise.resolve({\n      page: defaultPage,\n      tail: Promise.resolve(),\n      conversationUrl: initUrl,\n    }));",
              1,
          )
          text = text.replace(
              "return { page, tail: Promise.resolve() };",
              "return { page, tail: Promise.resolve(), conversationUrl: initialUrl };",
              1,
          )
          text = text.replace(
              "const sessionUrl = readSessionUrl(activeSessionFile);",
              "const sessionUrl = state.conversationUrl || readSessionUrl(activeSessionFile);",
              1,
          )
          text = text.replace(
              "const finalUrl = page.url();\n            if (conversationDetails(finalUrl).conversationId) {",
              "const finalUrl = page.url();\n            state.conversationUrl = finalUrl;\n            if (conversationDetails(finalUrl).conversationId) {",
              1,
          )
          chat.write_text(text, encoding='utf-8')

          parallel_test = Path('tests/chatgpt-parallel.check.js')
          text = parallel_test.read_text(encoding='utf-8')
          text = text.replace(
              '  assert.ok(a2.startsWith(aConversation + ":A2"));\n  assert.ok(b2.startsWith(bConversation + ":B2"));',
              '  assert.ok(a2.startsWith(aConversation + ":"));\n  assert.ok(b2.startsWith(bConversation + ":"));\n  assert.ok(a2.includes("Task: A2"));\n  assert.ok(b2.includes("Task: B2"));',
              1,
          )
          text = text.replace(
              '  assert.ok(legacy2.startsWith(legacyConversation + ":legacy2"));',
              '  assert.ok(legacy2.startsWith(legacyConversation + ":"));\n  assert.ok(legacy2.includes("Task: legacy2"));',
              1,
          )
          parallel_test.write_text(text, encoding='utf-8')
          PY
      - if: steps.apply.outcome == 'success'
        run: npm run check:syntax
      - name: Run npm checks
        id: npm_checks
        if: steps.apply.outcome == 'success'
        continue-on-error: true
        run: |
          set +e
          npm run check > /tmp/npm-check.log 2>&1
          status=$?
          cat /tmp/npm-check.log
          cp /tmp/npm-check.log scripts/npm-check-error.log
          exit "$status"
      - name: Commit npm check diagnostic
        if: steps.npm_checks.outcome == 'failure'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f scripts/npm-check-error.log
          git diff --cached --quiet || git commit -m "Record parallel recovery test failure"
          git push origin HEAD:feature/parallel-recovery
      - name: Stop after npm check failure
        if: steps.npm_checks.outcome == 'failure'
        run: exit 1
      - if: steps.npm_checks.outcome == 'success'
        run: python3 -m py_compile dispatcher/dispatcher.py scripts/chatgpt-compose.py scripts/chatgpt-compose-bridge.py
      - if: steps.npm_checks.outcome == 'success'
        run: python3 tests/dispatcher-git.check.py
      - if: steps.npm_checks.outcome == 'success'
        run: python3 tests/dispatcher-parallel.check.py
      - if: steps.npm_checks.outcome == 'success'
        run: git diff --check
      - name: Commit implementation
        if: steps.npm_checks.outcome == 'success'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.js check.js package.json agent/agent.js agent/chatgpt.js agent/fake-browser-client.js dispatcher/dispatcher.py tests/chatgpt-parallel.check.js tests/dispatcher-parallel.check.py .github/workflows/test.yml
          git diff --cached --quiet || git commit -m "Add parallel jobs and recovery handoffs"
          git push origin HEAD:feature/parallel-recovery
