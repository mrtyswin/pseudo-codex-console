name: apply-parallel-recovery-pr

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/parallel-recovery' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/parallel-recovery
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply implementation
        id: apply
        continue-on-error: true
        run: |
          set +e
          python3 - <<'PY' > /tmp/apply-parallel.log 2>&1
          import base64
          import zlib
          from pathlib import Path

          payload = ''.join(
              Path(f'scripts/.apply-parallel.part{i}').read_text().strip()
              for i in range(1, 5)
          )
          source = zlib.decompress(base64.b64decode(payload)).decode('utf-8')
          exec(compile(source, 'apply-parallel-recovery', 'exec'))
          PY
          status=$?
          cat /tmp/apply-parallel.log
          cp /tmp/apply-parallel.log scripts/apply-parallel-error.log
          exit "$status"
      - name: Commit diagnostic
        if: steps.apply.outcome == 'failure'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/apply-parallel-error.log
          git commit -m "Record parallel recovery apply failure"
          git push origin HEAD:feature/parallel-recovery
      - name: Stop after apply failure
        if: steps.apply.outcome == 'failure'
        run: exit 1
      - name: Apply compatibility fixes
        if: steps.apply.outcome == 'success'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          check = Path('check.js')
          text = check.read_text(encoding='utf-8')
          text = text.replace(
              "const marker = '<article class=\"job\" data-job-id=\"' + jobId + '\"';",
              "const marker = 'class=\"job\" data-job-id=\"' + jobId + '\"';"
          )
          check.write_text(text, encoding='utf-8')

          app = Path('app.js')
          text = app.read_text(encoding='utf-8')
          text = text.replace(
              'worker = { workerId: "", sessionId: "", pid: null, leaseSeconds: 300 };',
              'worker = { workerId: "", sessionId: "", pid: null, leaseSeconds: 300, excludedProjects: [] };'
          )
          app.write_text(text, encoding='utf-8')
          PY
      - if: steps.apply.outcome == 'success'
        run: npm run check:syntax
      - if: steps.apply.outcome == 'success'
        run: npm run check
      - if: steps.apply.outcome == 'success'
        run: python3 -m py_compile dispatcher/dispatcher.py scripts/chatgpt-compose.py scripts/chatgpt-compose-bridge.py
      - if: steps.apply.outcome == 'success'
        run: python3 tests/dispatcher-git.check.py
      - if: steps.apply.outcome == 'success'
        run: python3 tests/dispatcher-parallel.check.py
      - if: steps.apply.outcome == 'success'
        run: git diff --check
      - name: Commit implementation
        if: steps.apply.outcome == 'success'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.js check.js package.json agent/agent.js agent/chatgpt.js agent/fake-browser-client.js dispatcher/dispatcher.py tests/chatgpt-parallel.check.js tests/dispatcher-parallel.check.py .github/workflows/test.yml
          git diff --cached --quiet || git commit -m "Add parallel jobs and recovery handoffs"
          git push origin HEAD:feature/parallel-recovery
