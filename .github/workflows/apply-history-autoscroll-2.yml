name: apply-history-autoscroll-2

on:
  push:
    branches:
      - fix/history-autoscroll-2

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/history-autoscroll-2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: python3 scripts/apply-history-autoscroll-2.py
      - run: npm run check:syntax
      - run: npm run check
      - run: git diff --check
      - name: Commit repair
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app.js check.js
          git diff --cached --quiet || git commit -m "Fix initial history autoscroll"
          git push
