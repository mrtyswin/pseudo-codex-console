name: scan-host-native-runtime

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  scan:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/host-native-execution
          fetch-depth: 0
      - name: Record remaining isolated-runtime references
        run: |
          python3 - <<'PY'
          from pathlib import Path

          forbidden = (
              "sandbox" + "Workspace",
              "/mnt/" + "workspace",
              "sandboxed " + "ChatGPT",
              "inside a " + "sandbox",
              "from the " + "sandbox",
              "サンド" + "ボックス",
          )
          skipped = {
              Path(".github/workflows/apply-host-native.yml"),
              Path(".pseudo-codex/sandbox-scan.log"),
          }
          matches = []
          for path in Path(".").rglob("*"):
              if not path.is_file() or ".git" in path.parts or "node_modules" in path.parts:
                  continue
              if path.parts[:1] == ("tests",) or path.parts[:2] == ("docs", "archive") or path in skipped:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except (UnicodeDecodeError, OSError):
                  continue
              for value in forbidden:
                  if value in text:
                      matches.append(f"{path}: {value}")
          output = "\n".join(matches) + ("\n" if matches else "HOST_NATIVE_SCAN_CLEAN\n")
          Path(".pseudo-codex/sandbox-scan.log").write_text(output, encoding="utf-8")
          print(output, end="")
          PY
          git config user.name "Pseudo Codex GitHub Direct"
          git config user.email "pseudo-codex@example.invalid"
          git add -f .pseudo-codex/sandbox-scan.log
          if ! git diff --cached --quiet; then
            git commit -m "Record host-native runtime scan"
            git push origin HEAD:feature/host-native-execution
          fi
