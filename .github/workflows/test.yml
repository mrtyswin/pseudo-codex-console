name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run check:syntax
      - run: npm run check
      - run: python3 -m py_compile dispatcher/dispatcher.py scripts/chatgpt-compose.py scripts/chatgpt-compose-bridge.py
      - run: python3 tests/dispatcher-git.check.py
      - run: python3 tests/dispatcher-github-direct.check.py
      - run: python3 tests/dispatcher-config-reload.check.py
      - run: python3 tests/dispatcher-host-native.check.py
      - run: python3 tests/dispatcher-parallel.check.py
      - name: Verify project sandbox runtime is absent
        run: |
          python3 - <<'PY'
          from pathlib import Path

          forbidden = (
              "sandbox" + "Workspace",
              "/mnt/" + "workspace",
              "sandboxed " + "ChatGPT",
              "inside a " + "sandbox",
              "from the " + "sandbox",
              "サンド" + "ボックス",
          )
          skipped = {
              Path(".github/workflows/apply-host-native.yml"),
          }
          matches = []
          for path in Path(".").rglob("*"):
              if not path.is_file() or ".git" in path.parts or "node_modules" in path.parts:
                  continue
              if path.parts[:1] == ("tests",) or path.parts[:2] == ("docs", "archive") or path in skipped:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except (UnicodeDecodeError, OSError):
                  continue
              for value in forbidden:
                  if value in text:
                      matches.append(f"{path}: {value}")
          if matches:
              raise SystemExit("Project sandbox runtime references remain:\n" + "\n".join(matches))
          print("HOST_NATIVE_NO_PROJECT_SANDBOX_REFERENCES_OK")
          PY
