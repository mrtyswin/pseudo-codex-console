name: Apply Figma console UI

on:
  push:
    branches:
      - agent/figma-console-ui

permissions:
  contents: write

jobs:
  apply-ui:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/figma-console-ui
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply UI redesign
        run: node scripts/apply-ui-redesign.js

      - name: Verify syntax and console regression tests
        run: |
          node --check app.js
          npm run check:console

      - name: Remove temporary migration files
        run: |
          rm -f scripts/apply-ui-redesign.js
          rm -f scripts/ui-render-section.jsfrag
          rm -f .github/workflows/apply-figma-ui.yml

      - name: Commit verified UI redesign
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js scripts .github/workflows
          git commit -m "Redesign console UI from Figma proposal"
          git push origin HEAD:agent/figma-console-ui
