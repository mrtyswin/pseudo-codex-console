name: apply-generated-pr-patches

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'feature/github-direct-console'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply pending generated agent patch
        id: apply
        run: |
          changed=0
          if [ -f .pseudo-codex/phase2.patch ]; then
            python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('.pseudo-codex/phase2.patch')
          source = path.read_text(encoding='utf-8').replace('\r\n', '\n').split('\n')
          package_index = next(
              (i for i, line in enumerate(source) if line == 'diff --git a/package.json b/package.json'),
              len(source),
          )
          source = source[:package_index]
          normalized = []
          in_hunk = False
          for line in source:
              if line.startswith('index '):
                  continue
              if 'const BROWSER_SERVICE = os.environ.get' in line:
                  line = ' const CHATGPT_REQUEST_TIMEOUT_MS = Number.parseInt('
              if line.startswith('@@'):
                  in_hunk = True
              elif line.startswith(('diff --git ', '--- ', '+++ ')):
                  in_hunk = False
              elif in_hunk:
                  if line == '':
                      line = ' '
                  elif line[0] not in ' +-\\':
                      line = ' ' + line
              normalized.append(line)
          while normalized and normalized[-1] == ' ':
              normalized.pop()

          output = normalized[:]
          indexes = [i for i, line in enumerate(output) if line.startswith('@@ ')]
          for position, start in enumerate(indexes):
              end = indexes[position + 1] if position + 1 < len(indexes) else len(output)
              for candidate in range(start + 1, end):
                  if output[candidate].startswith('diff --git '):
                      end = candidate
                      break
              match = re.match(r'@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@(.*)', output[start])
              if not match:
                  continue
              old_count = 0
              new_count = 0
              for line in output[start + 1:end]:
                  if line.startswith('\\'):
                      continue
                  if line.startswith('-'):
                      old_count += 1
                  elif line.startswith('+'):
                      new_count += 1
                  else:
                      old_count += 1
                      new_count += 1
              output[start] = (
                  f'@@ -{match.group(1)},{old_count} +{match.group(2)},{new_count} @@'
                  f'{match.group(3)}'
              )
          path.write_text('\n'.join(output) + '\n', encoding='utf-8')
          PY
            if ! patch --dry-run --batch --forward --fuzz=3 -p1 < .pseudo-codex/phase2.patch >.pseudo-codex/patch.error 2>&1; then
              cp .pseudo-codex/patch.error .pseudo-codex/phase2.error
              git config user.name "Pseudo Codex GitHub Direct"
              git config user.email "pseudo-codex@example.invalid"
              git add .pseudo-codex/phase2.error .pseudo-codex/phase2.patch
              git commit -m "Record GitHub-direct agent patch failure"
              git push origin HEAD:${{ github.head_ref }}
              echo 'applied=false' >> "$GITHUB_OUTPUT"
              exit 0
            fi
            patch --batch --forward --fuzz=3 -p1 < .pseudo-codex/phase2.patch
            rm -f .pseudo-codex/phase2.patch .pseudo-codex/phase2.error .pseudo-codex/patch.error
            rm -f .pseudo-codex/phase2.trigger .github/workflows/apply-github-direct-agent.yml
            changed=1
          fi
          echo "applied=$changed" >> "$GITHUB_OUTPUT"
      - name: Verify
        if: steps.apply.outputs.applied == '1'
        run: |
          npm run check:syntax
          npm run check
      - name: Commit generated changes
        if: steps.apply.outputs.applied == '1'
        run: |
          git config user.name "Pseudo Codex GitHub Direct"
          git config user.email "pseudo-codex@example.invalid"
          git add -A
          git commit -m "Apply GitHub-direct agent implementation"
          git push origin HEAD:${{ github.head_ref }}
