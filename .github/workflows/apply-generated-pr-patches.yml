name: apply-generated-pr-patches

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'feature/github-direct-console'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply pending dispatcher patch
        id: apply
        run: |
          changed=0
          if [ -f .pseudo-codex/phase3.part.0 ]; then
            cat .pseudo-codex/phase3.part.* > .pseudo-codex/phase3.patch
            python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('.pseudo-codex/phase3.patch')
          source = path.read_text(encoding='utf-8').replace('\r\n', '\n').split('\n')
          normalized = []
          in_hunk = False
          controls = ('diff --git ', '--- ', '+++ ', 'new file mode ', 'deleted file mode ', '@@ ')
          for raw in source:
              stripped = raw.lstrip()
              if stripped.startswith('index '):
                  continue
              if stripped.startswith(controls):
                  raw = stripped
              if raw.startswith('@@ '):
                  in_hunk = True
              elif raw.startswith(('diff --git ', '--- ', '+++ ', 'new file mode ', 'deleted file mode ')):
                  in_hunk = False
              elif in_hunk:
                  if raw == '':
                      raw = ' '
                  elif raw[0] not in ' +-\\':
                      raw = ' ' + raw
              normalized.append(raw)
          while normalized and normalized[-1] == ' ':
              normalized.pop()

          output = normalized[:]
          indexes = [i for i, line in enumerate(output) if line.startswith('@@ ')]
          for position, start in enumerate(indexes):
              end = indexes[position + 1] if position + 1 < len(indexes) else len(output)
              for candidate in range(start + 1, end):
                  if output[candidate].startswith('diff --git '):
                      end = candidate
                      break
              match = re.match(r'@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@(.*)', output[start])
              if not match:
                  continue
              old_count = 0
              new_count = 0
              for line in output[start + 1:end]:
                  if line.startswith('\\'):
                      continue
                  if line.startswith('-'):
                      old_count += 1
                  elif line.startswith('+'):
                      new_count += 1
                  else:
                      old_count += 1
                      new_count += 1
              output[start] = (
                  f'@@ -{match.group(1)},{old_count} +{match.group(2)},{new_count} @@'
                  f'{match.group(3)}'
              )
          path.write_text('\n'.join(output) + '\n', encoding='utf-8')
          PY
            if ! patch --dry-run --batch --forward --fuzz=3 -p1 < .pseudo-codex/phase3.patch >.pseudo-codex/phase3.error 2>&1; then
              git config user.name "Pseudo Codex GitHub Direct"
              git config user.email "pseudo-codex@example.invalid"
              git add .pseudo-codex/phase3.error .pseudo-codex/phase3.patch
              git commit -m "Record dispatcher patch failure"
              git push origin HEAD:${{ github.head_ref }}
              echo 'applied=false' >> "$GITHUB_OUTPUT"
              exit 0
            fi
            patch --batch --forward --fuzz=3 -p1 < .pseudo-codex/phase3.patch
            rm -f .pseudo-codex/phase3.part.* .pseudo-codex/phase3.patch .pseudo-codex/phase3.error .pseudo-codex/phase3.trigger
            changed=1
          fi
          echo "applied=$changed" >> "$GITHUB_OUTPUT"
      - name: Verify and record
        id: verify
        if: steps.apply.outputs.applied == '1'
        run: |
          set +e
          : > .pseudo-codex/phase3.verify.log
          for command in \
            "npm run check:syntax" \
            "npm run check" \
            "python3 -m py_compile dispatcher/dispatcher.py" \
            "python3 tests/dispatcher-git.check.py" \
            "python3 tests/dispatcher-github-direct.check.py" \
            "python3 tests/dispatcher-parallel.check.py"
          do
            printf '\n$ %s\n' "$command" >> .pseudo-codex/phase3.verify.log
            sh -lc "$command" >> .pseudo-codex/phase3.verify.log 2>&1
            status=$?
            if [ "$status" -ne 0 ]; then
              echo "VERIFY_STATUS=$status" >> .pseudo-codex/phase3.verify.log
              echo "status=$status" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "status=0" >> "$GITHUB_OUTPUT"
      - name: Commit generated changes and verification log
        if: steps.apply.outputs.applied == '1'
        run: |
          git config user.name "Pseudo Codex GitHub Direct"
          git config user.email "pseudo-codex@example.invalid"
          git add -A
          git commit -m "Implement GitHub-direct dispatcher and record verification"
          git push origin HEAD:${{ github.head_ref }}
      - name: Fail when verification failed
        if: steps.apply.outputs.applied == '1' && steps.verify.outputs.status != '0'
        run: exit 1
