name: apply-generated-pr-patches

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'feature/github-direct-console'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply pending generated patches
        id: apply
        run: |
          changed=0
          if [ -f .pseudo-codex/phase2.patch ]; then
            python3 - <<'PY'
          from pathlib import Path
          path = Path('.pseudo-codex/phase2.patch')
          lines = path.read_text(encoding='utf-8').replace('\r\n', '\n').split('\n')
          output = []
          in_hunk = False
          for line in lines:
              if line.startswith('index 4749d0d..0000000 100755'):
                  line = 'index 4749d0d..0000000 100644'
              if line.startswith('@@'):
                  in_hunk = True
              elif line.startswith(('diff --git ', '--- ', '+++ ', 'index ')):
                  in_hunk = False
              elif in_hunk:
                  if line == '':
                      line = ' '
                  elif line[0] not in ' +-\\':
                      line = ' ' + line
              output.append(line)
          path.write_text('\n'.join(output), encoding='utf-8')
          PY
            if ! git apply --check --recount .pseudo-codex/phase2.patch 2>.pseudo-codex/phase2.error; then
              git config user.name "Pseudo Codex GitHub Direct"
              git config user.email "pseudo-codex@example.invalid"
              git add .pseudo-codex/phase2.error .pseudo-codex/phase2.patch
              git commit -m "Record normalized GitHub-direct patch failure"
              git push origin HEAD:${{ github.head_ref }}
              echo 'applied=false' >> "$GITHUB_OUTPUT"
              exit 0
            fi
            rm -f .pseudo-codex/phase2.error
            git apply --recount .pseudo-codex/phase2.patch
            rm .pseudo-codex/phase2.patch
            rm -f .pseudo-codex/phase2.trigger .github/workflows/apply-github-direct-agent.yml
            changed=1
          fi
          echo "applied=$changed" >> "$GITHUB_OUTPUT"
      - name: Verify
        if: steps.apply.outputs.applied == '1'
        run: |
          npm run check:syntax
          npm run check
      - name: Commit generated changes
        if: steps.apply.outputs.applied == '1'
        run: |
          git config user.name "Pseudo Codex GitHub Direct"
          git config user.email "pseudo-codex@example.invalid"
          git add -A
          git commit -m "Apply GitHub-direct agent implementation"
          git push origin HEAD:${{ github.head_ref }}
