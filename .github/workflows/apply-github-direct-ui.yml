name: apply-github-direct-ui

on:
  push:
    branches:
      - feature/github-direct-console

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[generated-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/github-direct-console
          fetch-depth: 0
      - name: Apply generated patch
        run: |
          git apply --check --recount .pseudo-codex/phase1.patch
          git apply --recount .pseudo-codex/phase1.patch
          rm .pseudo-codex/phase1.patch
          rm .github/workflows/apply-github-direct-ui.yml
      - name: Verify
        run: |
          npm run check:syntax
          npm run check
      - name: Commit generated changes
        run: |
          git config user.name "Pseudo Codex GitHub Direct"
          git config user.email "pseudo-codex@example.invalid"
          git add -A
          git commit -m "Implement GitHub-direct UI and readable job conversations [generated-applied]"
          git push origin HEAD:feature/github-direct-console
